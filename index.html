<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NoteTaker</title>
    <style>
        :root {
            --primary: #007bff;
            --bg: #f8f9fa;
            --text: #333;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        select, input, button {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border-radius: 12px;
            border: 1px solid #ddd;
            font-size: 16px;
            appearance: none;
        }
        button {
            background: var(--primary);
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:disabled {
            opacity: 0.5;
        }
        .record-btn {
            background: #dc3545;
            height: 80px;
            border-radius: 40px;
            font-size: 20px;
        }
        .recording {
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        #status {
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>NoteTaker</h2>
    
    <div id="setup-view">
        <p>Enter your Read-Only PAT to begin:</p>
        <input type="password" id="pat-input" placeholder="github_pat_...">
        <button onclick="savePat()">Connect</button>
    </div>

    <div id="app-view" class="hidden">
        <select id="project-select">
            <option value="">Select Project...</option>
        </select>
        
        <button id="record-btn" class="record-btn" onclick="toggleRecording()">Start Recording</button>
        <div id="status">Ready</div>
    </div>
</div>

<script>
    let mediaRecorder;
    let audioChunks = [];
    let isRecording = false;

    const PROXY_URL = "https://dpslhidnmifmbmrhugea.supabase.co/functions/v1/notetaker-proxy";
    const GITHUB_USER = "jepperich69";
    const GITHUB_REPO = "notetaker-inbox";

    // Initialization
    window.onload = () => {
        const pat = localStorage.getItem('notetaker_pat');
        if (pat) showApp();
    };

    function savePat() {
        const pat = document.getElementById('pat-input').value;
        if (pat) {
            localStorage.setItem('notetaker_pat', pat);
            showApp();
        }
    }

    async function showApp() {
        document.getElementById('setup-view').classList.add('hidden');
        document.getElementById('app-view').classList.remove('hidden');
        loadProjects();
    }

    async function loadProjects() {
        const pat = localStorage.getItem('notetaker_pat');
        try {
            const res = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/projects.json`, {
                headers: { 'Authorization': `token ${pat}` }
            });
            const data = await res.json();
            const projects = JSON.parse(atob(data.content));
            
            const select = document.getElementById('project-select');
            projects.forEach(p => {
                const opt = document.createElement('option');
                opt.value = p.key;
                opt.textContent = p.name;
                select.appendChild(opt);
            });
        } catch (e) {
            document.getElementById('status').textContent = "Error loading projects. Check PAT.";
        }
    }

    async function toggleRecording() {
        const btn = document.getElementById('record-btn');
        if (!isRecording) {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = uploadAudio;
            
            mediaRecorder.start();
            btn.textContent = "Stop & Send";
            btn.classList.add('recording');
            isRecording = true;
            document.getElementById('status').textContent = "Recording...";
        } else {
            mediaRecorder.stop();
            btn.textContent = "Start Recording";
            btn.classList.remove('recording');
            isRecording = false;
        }
    }

    async function uploadAudio() {
        const status = document.getElementById('status');
        const project = document.getElementById('project-select').value;
        const pat = localStorage.getItem('notetaker_pat');

        if (!project) {
            alert("Please select a project first!");
            return;
        }

        status.textContent = "Uploading...";
        const blob = new Blob(audioChunks, { type: 'audio/webm' });

        try {
            const res = await fetch(PROXY_URL, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${pat}`,
                    'X-NoteTaker-Project': project,
                    'Content-Type': 'audio/webm'
                },
                body: blob
            });

            const result = await res.json();
            if (result.ok) {
                status.textContent = "Sent successfully!";
                setTimeout(() => status.textContent = "Ready", 3000);
            } else {
                status.textContent = "Upload failed: " + result.code;
            }
        } catch (e) {
            status.textContent = "Network error.";
        }
    }
</script>
</body>
</html>
